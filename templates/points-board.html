<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Points Board</title>
</head>
<body>
<h1>Welcome to the Points Board.</h1>
<p>Find your club and the points available by club here.</p>

{% if clubs %}
<table>
    <thead>
        <tr>
            <th>Club Name</th>
            <th>Points</th>
        </tr>
    </thead>
    <tbody>
        {% for club in clubs %}
        <tr>
            <td>{{ club['name'] }}</td>
            <td>{{ club['points'] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
    <p>No clubs registered.</p>
{% endif %}

</body>
</html>
